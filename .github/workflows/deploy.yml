name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/dongruiyang2024/api-product

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}

      - name: Prepare SSH
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_DEPLOY_KEY }}" > ~/.ssh/aliyun_deploy
          chmod 600 ~/.ssh/aliyun_deploy
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Aliyun
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH || '/root/service/sub2api' }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh -i ~/.ssh/aliyun_deploy -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' DEPLOY_PATH='$DEPLOY_PATH' bash -se" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          test -f docker-compose.yml
          test -f docker-compose.prod.yml

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull sub2api
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
          docker image prune -f
          EOF
