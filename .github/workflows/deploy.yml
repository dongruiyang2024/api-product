name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/dongruiyang2024/api-product

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}

      - name: Prepare SSH
        env:
          ALIYUN_DEPLOY_BUNDLE: ${{ secrets.ALIYUN_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          bundle_file="$RUNNER_TEMP/aliyun-deploy.env"
          printf '%s\n' "$ALIYUN_DEPLOY_BUNDLE" > "$bundle_file"

          get_config() {
            key="$1"
            default="${2:-}"
            value="$(sed -n "s/^${key}=//p" "$bundle_file" | head -n 1)"
            if [ -z "$value" ]; then
              value="$default"
            fi
            printf '%s' "$value"
          }

          ALIYUN_HOST="$(get_config ALIYUN_HOST)"
          ALIYUN_USER="$(get_config ALIYUN_USER root)"
          ALIYUN_PORT="$(get_config ALIYUN_PORT 22)"
          ALIYUN_DEPLOY_PATH="$(get_config ALIYUN_DEPLOY_PATH /root/service/sub2api)"

          if [ -z "$ALIYUN_HOST" ]; then
            echo "::error::ALIYUN_DEPLOY_KEY must include ALIYUN_HOST=your_server_ip"
            exit 1
          fi

          mkdir -p ~/.ssh
          sed -n '/^ALIYUN_DEPLOY_KEY=/,$p' "$bundle_file" \
            | sed '1s/^ALIYUN_DEPLOY_KEY=//' \
            | sed "1s/^'//; \$s/'$//" \
            > ~/.ssh/aliyun_deploy
          chmod 600 ~/.ssh/aliyun_deploy

          if ! grep -q -- '-----BEGIN OPENSSH PRIVATE KEY-----' ~/.ssh/aliyun_deploy; then
            echo "::error::ALIYUN_DEPLOY_KEY must include a full OPENSSH private key after ALIYUN_DEPLOY_KEY="
            exit 1
          fi

          {
            echo "ALIYUN_HOST=$ALIYUN_HOST"
            echo "ALIYUN_USER=$ALIYUN_USER"
            echo "ALIYUN_PORT=$ALIYUN_PORT"
            echo "ALIYUN_DEPLOY_PATH=$ALIYUN_DEPLOY_PATH"
          } >> "$GITHUB_ENV"

          ssh-keyscan -p "$ALIYUN_PORT" "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Aliyun
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh -i ~/.ssh/aliyun_deploy -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' DEPLOY_PATH='$ALIYUN_DEPLOY_PATH' bash -se" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          test -f docker-compose.yml
          test -f docker-compose.prod.yml

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull sub2api
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
          docker image prune -f
          EOF
