name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/dongruiyang2024/api-product
  IMAGE_TAG: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Prepare SSH
        env:
          ALIYUN_DEPLOY_BUNDLE: ${{ secrets.ALIYUN_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          bundle_file="$RUNNER_TEMP/aliyun-deploy.env"
          printf '%s\n' "$ALIYUN_DEPLOY_BUNDLE" > "$bundle_file"

          get_config() {
            key="$1"
            default="${2:-}"
            value="$(sed -n "s/^${key}=//p" "$bundle_file" | head -n 1)"
            if [ -z "$value" ]; then
              value="$default"
            fi
            printf '%s' "$value"
          }

          ALIYUN_HOST="$(get_config ALIYUN_HOST)"
          ALIYUN_USER="$(get_config ALIYUN_USER root)"
          ALIYUN_PORT="$(get_config ALIYUN_PORT 22)"
          ALIYUN_DEPLOY_PATH="$(get_config ALIYUN_DEPLOY_PATH /root/service/sub2api)"

          if [ -z "$ALIYUN_HOST" ]; then
            echo "::error::ALIYUN_DEPLOY_KEY must include ALIYUN_HOST=your_server_ip"
            exit 1
          fi

          mkdir -p ~/.ssh
          sed -n '/^ALIYUN_DEPLOY_KEY=/,$p' "$bundle_file" \
            | sed '1s/^ALIYUN_DEPLOY_KEY=//' \
            | sed "1s/^'//; \$s/'$//" \
            > ~/.ssh/aliyun_deploy
          chmod 600 ~/.ssh/aliyun_deploy

          if ! grep -q -- '-----BEGIN OPENSSH PRIVATE KEY-----' ~/.ssh/aliyun_deploy; then
            echo "::error::ALIYUN_DEPLOY_KEY must include a full OPENSSH private key after ALIYUN_DEPLOY_KEY="
            exit 1
          fi

          {
            echo "ALIYUN_HOST=$ALIYUN_HOST"
            echo "ALIYUN_USER=$ALIYUN_USER"
            echo "ALIYUN_PORT=$ALIYUN_PORT"
            echo "ALIYUN_DEPLOY_PATH=$ALIYUN_DEPLOY_PATH"
          } >> "$GITHUB_ENV"

          ssh-keyscan -T 10 -p "$ALIYUN_PORT" "$ALIYUN_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning::ssh-keyscan timed out; SSH will use StrictHostKeyChecking=accept-new"

      - name: Deploy on Aliyun
        run: |
          deploy_script="$RUNNER_TEMP/deploy-aliyun.sh"
          cat > "$deploy_script" <<'EOF'
          set -euo pipefail

          docker compose version >/dev/null

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          test -f docker-compose.yml
          test -f docker-compose.prod.yml

          cat > docker-compose.ghcr.yml <<YAML
          services:
            sub2api:
              image: ${IMAGE_NAME}:${IMAGE_TAG}
              pull_policy: always
          YAML

          COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ghcr.yml"
          docker compose $COMPOSE_FILES pull sub2api
          docker compose $COMPOSE_FILES up -d --remove-orphans
          docker compose $COMPOSE_FILES ps
          docker image prune -f
          EOF

          last_status=0
          for attempt in 1 2 3 4 5; do
            echo "Starting Aliyun deploy over SSH, attempt ${attempt}/5"
            if ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -o TCPKeepAlive=yes \
              -o BatchMode=yes \
              -i ~/.ssh/aliyun_deploy \
              -p "$ALIYUN_PORT" \
              "$ALIYUN_USER@$ALIYUN_HOST" \
              "DEPLOY_PATH='$ALIYUN_DEPLOY_PATH' IMAGE_NAME='$IMAGE_NAME' IMAGE_TAG='$IMAGE_TAG' bash -se" < "$deploy_script"; then
              exit 0
            fi

            last_status="$?"
            sleep_seconds=$((attempt * 15))
            echo "::warning::SSH deploy attempt ${attempt}/5 failed with exit code ${last_status}; retrying in ${sleep_seconds}s"
            sleep "$sleep_seconds"
          done

          exit "$last_status"
