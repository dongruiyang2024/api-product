name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/dongruiyang2024/api-product.git

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Prepare SSH
        env:
          ALIYUN_DEPLOY_BUNDLE: ${{ secrets.ALIYUN_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          bundle_file="$RUNNER_TEMP/aliyun-deploy.env"
          printf '%s\n' "$ALIYUN_DEPLOY_BUNDLE" > "$bundle_file"

          get_config() {
            key="$1"
            default="${2:-}"
            value="$(sed -n "s/^${key}=//p" "$bundle_file" | head -n 1)"
            if [ -z "$value" ]; then
              value="$default"
            fi
            printf '%s' "$value"
          }

          ALIYUN_HOST="$(get_config ALIYUN_HOST)"
          ALIYUN_USER="$(get_config ALIYUN_USER root)"
          ALIYUN_PORT="$(get_config ALIYUN_PORT 22)"
          ALIYUN_DEPLOY_PATH="$(get_config ALIYUN_DEPLOY_PATH /root/service/sub2api)"

          if [ -z "$ALIYUN_HOST" ]; then
            echo "::error::ALIYUN_DEPLOY_KEY must include ALIYUN_HOST=your_server_ip"
            exit 1
          fi

          mkdir -p ~/.ssh
          sed -n '/^ALIYUN_DEPLOY_KEY=/,$p' "$bundle_file" \
            | sed '1s/^ALIYUN_DEPLOY_KEY=//' \
            | sed "1s/^'//; \$s/'$//" \
            > ~/.ssh/aliyun_deploy
          chmod 600 ~/.ssh/aliyun_deploy

          if ! grep -q -- '-----BEGIN OPENSSH PRIVATE KEY-----' ~/.ssh/aliyun_deploy; then
            echo "::error::ALIYUN_DEPLOY_KEY must include a full OPENSSH private key after ALIYUN_DEPLOY_KEY="
            exit 1
          fi

          {
            echo "ALIYUN_HOST=$ALIYUN_HOST"
            echo "ALIYUN_USER=$ALIYUN_USER"
            echo "ALIYUN_PORT=$ALIYUN_PORT"
            echo "ALIYUN_DEPLOY_PATH=$ALIYUN_DEPLOY_PATH"
          } >> "$GITHUB_ENV"

          ssh-keyscan -p "$ALIYUN_PORT" "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Aliyun
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          REPO_URL: ${{ env.REPO_URL }}
        run: |
          ssh -i ~/.ssh/aliyun_deploy -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
            "DEPLOY_PATH='$ALIYUN_DEPLOY_PATH' REPO_URL='$REPO_URL' GIT_REF='$GIT_REF' GIT_SHA='$GIT_SHA' bash -se" <<'EOF'
          set -euo pipefail

          command -v git >/dev/null
          docker compose version >/dev/null

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          test -f docker-compose.yml
          test -f docker-compose.prod.yml

          if [ ! -d source/.git ]; then
            rm -rf source
            git clone --branch "$GIT_REF" "$REPO_URL" source
          fi

          cd source
          git fetch origin "$GIT_REF"
          git checkout --force "$GIT_SHA"
          cd "$DEPLOY_PATH"

          cat > docker-compose.local-build.yml <<YAML
          services:
            sub2api:
              image: api-product/sub2api:main
              build:
                context: ./source
                dockerfile: Dockerfile
                args:
                  VERSION: main
                  COMMIT: ${GIT_SHA}
          YAML

          COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.local-build.yml"
          docker compose $COMPOSE_FILES build sub2api
          docker compose $COMPOSE_FILES up -d --remove-orphans
          docker compose $COMPOSE_FILES ps
          docker image prune -f
          EOF
